[Match]
Distribution=fedora

[Build]
SandboxTrees=repos/terra.repo:/etc/yum.repos.d/terra.repo

[Distribution]
Repositories=terra

[Content]
WithRecommends=false
Packages=
    iio-niri
    maple-fonts
    satty
    terra-release
    terra-release-extras
    valent
    xdg-terminal-exec-nautilus
    uupd
