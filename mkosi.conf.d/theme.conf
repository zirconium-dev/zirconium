[Match]
Distribution=fedora

[Content]
ExtraTrees=
    assets/logos/logo-z.svg:/usr/share/zirconium/pixmaps/logo-z.svg
    assets/logos/watermark.png:/usr/share/plymouth/themes/spinner/watermark.png
    assets/wallpapers:/usr/share/zirconium/skel/Pictures/Wallpapers
    cosign.pub:/usr/share/pki/containers/zirconium.pub

[Content]
WithRecommends=true
RemoveFiles=
    /usr/bin/chsh
    /usr/lib/systemd/system/flatpak-add-fedora-repos.service
    /usr/share/applications/fcitx5-wayland-launcher.desktop
    /usr/share/applications/org.fcitx.Fcitx5*.desktop
    /usr/share/applications/foot-server.desktop
    /usr/share/doc/just

RemovePackages=
    alacritty
    fuzzel
    mako
    PackageKit
    PackageKit-glib
    qemu-user-static
    swayidle
    ublue-os-update-services
    swaylock
    waybar
    ibus-panel
    systemd-networkd

Packages=
    bolt
    brightnessctl
    btop
    cava
    chezmoi
    ddcutil
    default-fonts
    default-fonts-core-emoji
    distribution-gpg-keys
    distrobox
    fastfetch
    fcitx5-chinese-addons
    fcitx5-mozc
    fcitx5-rime
    flatpak
    foot
    fpaste
    fzf
    gcr
    generic-logos
    git-core
    glibc-all-langpacks
    glycin-thumbnailer
    gnome-disk-utility
    gnome-keyring
    gnome-keyring-pam
    gnupg2-scdaemon
    google-noto-color-emoji-fonts
    google-noto-emoji-fonts
    greetd
    greetd-selinux
    gst-thumbnailers
    hyfetch
    input-remapper
    just
    kf6-kimageformats
    kf6-kirigami
    kf6-qqc2-desktop-style
    khal
    librime-lua
    lshw
    nano-default-editor
    nautilus
    nautilus-python
    ncurses
    nm-connection-editor
    nmtui
    openrgb-udev-rules
    openssh-askpass
    orca
    plasma-breeze
    playerctl
    qt6ct
    qt6-qtimageformats
    qt6-qtmultimedia
    steam-devices
    tailscale
    tesseract
    udiskie
    webp-pixbuf-loader
    wl-clipboard
    wl-mirror
    wtype
