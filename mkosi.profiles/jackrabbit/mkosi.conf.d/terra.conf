[Build]
SandboxTrees=../../repos/terra.repo:/etc/yum.repos.d/terra.repo

[Distribution]
Repositories=terra

[Content]
RemoveFiles=
    /usr/share/wayland-sessions/gamescope-session-steam.desktop

Packages=
    asusctl
    dkms-xone
    gamescope-session-ogui-steam
    gamescope-session-opengamepadui
    gamescope-session-plus
    gamescope-session-steam
    inputplumber
    opengamepadui
    powerbuttond
    powerstation
    ScopeBuddy
    scx-scheds
    scx-tools
    steam
    steam-notif-daemon
    steamos-manager
    steamos-manager-gamescope-session-plus
    umu-launcher
