# THIS PROFILE SHOULD NOT BE USED BY DEFAULT
# This is an implementation of sysupdate-based zirconium, everything that would be necessary to implement the same idea as systemd's particleOS.

[Match]
Profiles=sysupdate

[Output]
SplitArtifacts=uki,partitions
Format=disk

[Content]
Bootable=yes
Bootloader=systemd-boot
UnifiedKernelImageFormat=%i_%v_%a
InitrdProfiles=
KernelInitrdModules=default
KernelCommandLine=
    audit=1
    ipe.enforce=1
    mount.usr=dissect
    rd.systemd.debug-shell=ttyS0
    root=dissect
    rw
    systemd.debug-shell=ttyS0
    systemd.image_filter=usr=Zirconium_*:usr-verity=Zirconium_*:usr-verity-sig=Zirconium_*:root=Zirconium-*:swap=Zirconium-*:home=Zirconium-*
    systemd.image_policy=esp=unprotected:xbootldr=unprotected+unused+absent:usr=signed:root=encrypted+absent:swap=encrypted+unused+absent:home=unprotected+absent:=ignore
    systemd.verity_usr_options=root-hash-signature=auto

[Validation]
# just for now, please do enable secureboot
SecureBoot=no
SignExpectedPcr=no

# mkosi vm specific
[Runtime]
RuntimeSize=40G
RAM=4G
CPUs=4
Ephemeral=yes
Credentials=
    passwd.plaintext-password.root=particleos
    tty.serial.hvc0.agetty.autologin=particleos
    tty.serial.hvc0.login.noauth=yes
    tty.console.agetty.autologin=particleos
    tty.console.login.noauth=yes
    tty.virtual.tty1.agetty.autologin=particleos
    tty.virtual.tty1.login.noauth=yes
